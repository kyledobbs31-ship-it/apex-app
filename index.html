<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Training Ledger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --bg:#08090c; --panel:#12141b; --raised:#191d27; --line:#252b37;
  --text:#e9eef6; --dim:#8a97a8; --faint:#5a6676;
  --accent:#4d8dff; --accent-ink:#04122b; --shadow:rgba(0,0,0,.4);
  --strength:#4d8dff; --sleep:#8b8cf7; --steps:#57d98a; --food:#ffa03a; --activity:#24c6c0; --heart:#ff6b6b;
}
html[data-theme="light"]{
  --bg:#ffffff; --panel:#f1f6ff; --raised:#e6f0ff; --line:#d3e1f6;
  --text:#0f1b2d; --dim:#5a6b83; --faint:#93a4bf;
  --accent:#2f6bff; --accent-ink:#ffffff; --shadow:rgba(24,60,120,.10);
  --strength:#2f6bff; --sleep:#6d6ef0; --steps:#22b56b; --food:#f08a1e; --activity:#159b96; --heart:#e5484d;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:'Space Grotesk',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh; transition:background .25s,color .25s;
  background-image:radial-gradient(circle at 15% -5%, color-mix(in srgb,var(--accent) 8%,transparent), transparent 42%),
                   radial-gradient(circle at 90% 0%, color-mix(in srgb,var(--sleep) 8%,transparent), transparent 45%);
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}
.wrap{max-width:940px;margin:0 auto;padding:22px 18px 110px}

.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#a0c4ff));
  display:grid;place-items:center;box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 40%,transparent)}
.word{font-size:20px;font-weight:700;letter-spacing:.18em}
.word span{color:var(--accent)}
.tagline{font-size:11.5px;letter-spacing:.03em;color:var(--dim);font-weight:500;margin-top:2px}
.tagline span{color:var(--accent);font-weight:700}
.topright{display:flex;align-items:center;gap:8px}
.datechip{font-size:12px;color:var(--dim);text-align:right;line-height:1.3}
.datechip b{display:block;color:var(--text);font-weight:600}
.gear{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--dim);
  display:grid;place-items:center;cursor:pointer;transition:.15s}
.gear:hover{color:var(--text);border-color:var(--accent)}
.gear.on{color:var(--accent);border-color:var(--accent)}
.gear img{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block}
.gear.hasimg{border:0;padding:0;overflow:hidden}
.gear.hasimg.on{box-shadow:0 0 0 2px var(--accent)}
.avatar{width:72px;height:72px;border-radius:50%;background:var(--raised);border:1px solid var(--line);display:grid;place-items:center;color:var(--faint);overflow:hidden;flex:none}
.avatar img{width:100%;height:100%;object-fit:cover}

.nav{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:5px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;scroll-snap-type:x proximity;scroll-padding-left:5px}
.nav::-webkit-scrollbar{display:none}
.nav button{flex:1 0 auto;min-width:60px;scroll-snap-align:start;border:0;background:transparent;color:var(--dim);padding:9px 6px;
  border-radius:10px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;display:flex;
  flex-direction:column;align-items:center;gap:5px;letter-spacing:.01em;transition:.16s}
.nav button:hover,.nav button:active{background:var(--accent);color:var(--accent-ink)}
.nav button.on{background:var(--accent);color:var(--accent-ink);box-shadow:0 2px 8px var(--shadow)}

.goalstrip{display:flex;align-items:center;gap:12px;background:linear-gradient(120deg,color-mix(in srgb,var(--accent) 16%,var(--panel)),var(--panel));
  border:1px solid var(--line);border-radius:13px;padding:11px 15px;margin-bottom:20px}
.goalstrip .gi{width:30px;height:30px;border-radius:8px;background:var(--accent);color:var(--accent-ink);display:grid;place-items:center;flex:none}
.goalstrip .gt{flex:1;min-width:0}
.goalstrip .gt .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600}
.goalstrip .gt .v{font-weight:600;font-size:14px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goalstrip .gp{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:15px;flex:none}

.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
.card.catcard{background:var(--accent);border-color:transparent}
.card.catcard .metric small{color:var(--accent-ink);opacity:.75}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:720px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}}
@media(max-width:600px){.row:has(> button){flex-direction:column;align-items:stretch}.row:has(> button) > *{width:100%;flex:0 0 auto}}

.eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:6px}
.metric{font-size:30px;font-weight:700;line-height:1;margin-top:10px}
.metric small{font-size:14px;color:var(--dim);font-weight:500;margin-left:3px}
.sub{font-size:12px;color:var(--dim);margin-top:7px}
.sectitle{font-size:15px;font-weight:600;margin:26px 0 12px;display:flex;align-items:center;gap:9px}
.sectitle .ln{flex:1;height:1px;background:var(--line)}

.ringwrap{display:flex;align-items:center;gap:20px}
.ringcap{font-size:34px;font-weight:700}
.ringlbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}

button.btn{font-family:inherit;cursor:pointer;border-radius:11px;font-weight:600;border:1px solid var(--line);
  background:var(--raised);color:var(--text);padding:11px 15px;font-size:13.5px;display:inline-flex;align-items:center;gap:8px;transition:.15s}
button.btn:hover{border-color:var(--accent);transform:translateY(-1px)}
button.btn.primary{background:var(--accent);border:0;color:var(--accent-ink);box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 35%,transparent)}
button.btn.ghost{background:transparent}
button.btn.sm{padding:7px 11px;font-size:12px;border-radius:9px}
button.btn.wide{width:100%;justify-content:center}
button.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
button.icon{background:transparent;border:0;color:var(--faint);cursor:pointer;padding:5px;border-radius:7px;display:grid;place-items:center;transition:.15s}
button.icon:hover{color:var(--heart);background:color-mix(in srgb,var(--heart) 12%,transparent)}

label.f{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;font-weight:600}
input,select,textarea{width:100%;font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;transition:.15s}
html[data-theme="light"] input,html[data-theme="light"] select{background:#fff}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}
input.mono{font-family:'JetBrains Mono',monospace}
.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:0}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:var(--bg);color:var(--dim);border-radius:10px;padding:9px 13px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;transition:.14s}
.chip.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.actsel{display:flex;gap:8px;flex-wrap:wrap}
.actsel button{flex:1;min-width:88px;border:1px solid var(--line);background:var(--raised);color:var(--text);border-radius:11px;padding:11px 8px;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.actsel button:hover,.actsel button:active,.actsel button.on{background:var(--accent);color:var(--accent-ink);border-color:transparent}
.qd{display:flex;gap:6px}
.qd button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--faint);cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;transition:.14s}
.qd button.on{border-color:var(--sleep);background:color-mix(in srgb,var(--sleep) 16%,transparent);color:var(--sleep)}

.lrow{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--bg);margin-bottom:9px}
.lrow .lh{display:flex;align-items:center;justify-content:space-between;gap:10px}
.tag{font-size:10.5px;letter-spacing:.06em;padding:3px 8px;border-radius:20px;background:var(--raised);color:var(--dim);font-weight:600}
.exline{font-size:12.5px;color:var(--dim);margin-top:4px}.exline b{color:var(--text);font-weight:500}

.setgrid{display:grid;grid-template-columns:34px 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:7px}
.setno{font-size:12px;color:var(--faint);text-align:center;font-family:'JetBrains Mono',monospace}

.empty{text-align:center;padding:32px 18px;color:var(--dim)}
.empty .ei{width:46px;height:46px;border-radius:13px;background:var(--raised);display:grid;place-items:center;margin:0 auto 12px;color:var(--faint)}
.empty b{color:var(--text);font-weight:600;display:block;margin-bottom:5px;font-size:15px}

.pr{text-align:center}.pr .v{font-size:24px;font-weight:700}.pr .v small{font-size:13px}
.pr .k{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:5px}
.streak{display:inline-flex;align-items:center;gap:7px;background:color-mix(in srgb,var(--steps) 12%,transparent);border:1px solid color-mix(in srgb,var(--steps) 30%,transparent);color:var(--steps);padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600}
svg.chart{width:100%;height:auto;display:block}

.note{font-size:12.5px;line-height:1.55;color:var(--dim)}.note b{color:var(--text);font-weight:600}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;letter-spacing:.04em}
.pill.ok{background:color-mix(in srgb,var(--steps) 14%,transparent);color:var(--steps)}
.pill.off{background:var(--raised);color:var(--faint)}
.pill.warn{background:color-mix(in srgb,var(--food) 16%,transparent);color:var(--food)}
.bpm{font-size:44px;font-weight:700;line-height:1}.bpm small{font-size:15px;color:var(--dim);font-weight:500}
.hb{display:inline-block;color:var(--heart);animation:beat 1s ease-in-out infinite}
@keyframes beat{0%,100%{transform:scale(1)}30%{transform:scale(1.22)}}
.msg{border-radius:11px;padding:11px 14px;font-size:13px;font-weight:500;margin-bottom:16px;border:1px solid}
.msg.ok{background:color-mix(in srgb,var(--steps) 10%,transparent);border-color:color-mix(in srgb,var(--steps) 30%,transparent);color:var(--steps)}
.msg.err{background:color-mix(in srgb,var(--heart) 10%,transparent);border-color:color-mix(in srgb,var(--heart) 30%,transparent);color:var(--heart)}
.code{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.6;color:var(--dim);overflow-x:auto;white-space:pre;margin-top:4px}
.steps-ol{margin:0;padding-left:20px;font-size:13px;line-height:1.7;color:var(--dim)}.steps-ol b{color:var(--text)}

/* rest timer */
.rtimer{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.rtimer .disp{font-size:40px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:120px}
.rtimer .disp.warn{color:var(--food)}
/* activity live */
.livebig{font-size:38px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.livelbl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-top:4px}
.map{background:var(--bg);border:1px solid var(--line);border-radius:12px;overflow:hidden}
/* badges */
.badgegrid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.badge{text-align:center;padding:12px 5px;border-radius:13px;border:1px solid var(--line);background:var(--bg);opacity:.4;filter:grayscale(1);transition:.2s;cursor:pointer;position:relative}
.badge:hover{transform:translateY(-2px);border-color:var(--accent)}
.badge.pinned{opacity:1;filter:none;border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--bg))}
.badge .pin{position:absolute;top:5px;right:5px;color:var(--accent)}
.badge.earned{opacity:1;filter:none;border-color:color-mix(in srgb,var(--accent) 40%,var(--line));background:color-mix(in srgb,var(--accent) 8%,var(--bg))}
.badge .bi{width:40px;height:40px;border-radius:50%;margin:0 auto 7px;display:grid;place-items:center;background:var(--raised)}
.badge.earned .bi{background:var(--accent);color:var(--accent-ink)}
.badge .bl{font-size:10.5px;font-weight:600;line-height:1.2}
/* leaderboard */
.lb{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;border:1px solid var(--line);background:var(--bg);margin-bottom:8px}
.lb.me{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--bg))}
.lb .rk{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;font-family:'JetBrains Mono',monospace;background:var(--raised);color:var(--dim);flex:none}
.lb .rk.g{background:#f5c542;color:#231400}.lb .rk.s{background:#c9d3e0;color:#1a2330}.lb .rk.b{background:#cd8a4b;color:#231400}
.lb .nm{flex:1;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb .sc{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent)}
/* reorder */
.reorder .ro{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--bg);margin-bottom:8px}
.reorder .ro .nm{flex:1;font-weight:600;font-size:14px;display:flex;align-items:center;gap:9px}
.reorder .ro .arr{display:flex;gap:4px}
.reorder .ro .arr button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--raised);color:var(--dim);cursor:pointer;display:grid;place-items:center}
.reorder .ro .arr button:hover:not(:disabled){color:var(--accent);border-color:var(--accent)}
.reorder .ro .arr button:disabled{opacity:.3;cursor:default}
.setrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.setrow.first,.setrow:first-of-type{border-top:0}
.setrow .st{flex:1;min-width:0}
.setrow .st .t{font-weight:600;font-size:14px}
.setrow .st .d{font-size:12px;color:var(--dim);margin-top:2px}
.sw{position:relative;width:46px;height:27px;border-radius:20px;background:var(--line);cursor:pointer;transition:.15s;flex:none;border:0;padding:0}
.sw.on{background:var(--accent)}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.15s}
.sw.on::after{transform:translateX(19px)}

/* FAB */
.fab{position:fixed;right:20px;bottom:22px;width:58px;height:58px;border-radius:18px;border:0;cursor:pointer;z-index:40;
  background:var(--accent);color:var(--accent-ink);display:grid;place-items:center;box-shadow:0 8px 24px color-mix(in srgb,var(--accent) 45%,transparent);transition:.2s}
.fab:hover{transform:translateY(-2px)}
.fab.open{transform:rotate(45deg)}
.fabmenu{position:fixed;right:20px;bottom:90px;z-index:40;display:flex;flex-direction:column;gap:9px;align-items:flex-end}
.fabmenu.hidden{display:none}
.fabmenu button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:11px 15px;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:9px;box-shadow:0 4px 16px var(--shadow);transition:.14s}
.fabmenu button:hover{border-color:var(--accent);transform:translateX(-3px)}

/* overlays */
.overlay{position:fixed;inset:0;z-index:60;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(6px);display:grid;place-items:center;padding:22px}
.overlay.hidden{display:none}
.sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px var(--shadow)}
.congrats{text-align:center}
.scanvid{width:100%;border-radius:14px;background:#000;aspect-ratio:4/3;object-fit:cover;display:block}
.congrats .cb{width:88px;height:88px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;background:var(--accent);color:var(--accent-ink);box-shadow:0 0 0 10px color-mix(in srgb,var(--accent) 15%,transparent);animation:pop .4s cubic-bezier(.3,1.5,.6,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.congrats h2{margin:0 0 6px;font-size:22px}.congrats p{color:var(--dim);margin:0 0 20px;font-size:14px}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:50;background:var(--text);color:var(--bg);
  padding:11px 18px;border-radius:12px;font-weight:600;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 8px 24px var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion: reduce){*{transition:none!important}.hb,.congrats .cb{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand" data-view="today" title="Home"><div class="mark" id="markicon"></div><div><div class="word">AP<span>E</span>X</div><div class="tagline">Log it. Live it. <span>LOVE</span> it.</div></div></div>
    <div class="topright">
      <div class="datechip"><b id="datelbl"></b>training ledger</div>
      <button class="gear" id="profilebtn" title="Profile"></button>
      <button class="gear" id="gearbtn" title="Settings"></button>
    </div>
  </div>
  <div class="nav" id="nav"></div>
  <div id="goalstrip"></div>
  <div id="content"></div>
</div>

<button class="fab" id="fab"></button>
<div class="fabmenu hidden" id="fabmenu"></div>
<div class="overlay hidden" id="overlay"></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileinput" accept=".csv,.json,.txt" style="display:none">
<input type="file" id="avatarinput" accept="image/*" style="display:none">

<script>
/* ============================ constants ============================ */
const C={strength:"#4d8dff",sleep:"#8b8cf7",steps:"#57d98a",food:"#ffa03a",activity:"#24c6c0",heart:"#ff6b6b"};
const cssVar=n=>getComputedStyle(document.body).getPropertyValue("--"+n).trim()||"#888";

const ICO={
  activity:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>',
  dumbbell:'<path d="M6 6v12M4 8v8M18 6v12M20 8v8M6 12h12"/>',
  moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>',
  foot:'<path d="M5 16c0-3 1-6 3-6s2 3 2 5-1 4-2.5 4S5 18 5 16z"/><path d="M14 9c0-3 1-5 3-5s2 3 2 5-1 4-2.5 4S14 11 14 9z"/>',
  trend:'<path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/>',
  flame:'<path d="M12 2s5 4 5 9a5 5 0 0 1-10 0c0-2 1-3 2-4 0 2 1 3 2 3 1 0 1.5-1 1.5-2.5C12.5 7 10 6 12 2z"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>',
  pin:'<path d="M12 17v5"/><path d="M9 2h6l-1 6 3 3v2H7v-2l3-3-1-6z"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',check:'<path d="M20 6 9 17l-5-5"/>',x:'<path d="M18 6 6 18M6 6l12 12"/>',

function pace(sec,km){if(!km)return "—";const p=sec/km;return `${Math.floor(p/60)}:${pad(Math.round(p%60))}`;}
function haversine(a,b){const R=6371000,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,la1=a.lat*Math.PI/180,la2=b.lat*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

function chartShell(inner){return `<svg class="chart" viewBox="0 0 700 210" preserveAspectRatio="xMidYMid meet">${inner}</svg>`;}
function gridAndLabels(max,fmtY,rows,pl,pr,pt,pb){const W=700,H=210,ih=H-pt-pb,iw=W-pl-pr,LN=cssVar("line"),FA=cssVar("faint");let g="";
  for(let i=0;i<=2;i++){const y=pt+ih-(i/2)*ih,val=(i/2)*max;
    g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="${LN}" stroke-dasharray="3 3"/><text x="${pl-6}" y="${y+4}" text-anchor="end" font-size="11" fill="${FA}" font-family="JetBrains Mono">${fmtY(val)}</text>`;}
  const n=rows.length,step=Math.max(1,Math.ceil(n/7));
  rows.forEach((r,i)=>{if(i%step===0||i===n-1){const x=pl+(iw/n)*i+(iw/n)/2;g+=`<text x="${x}" y="${H-8}" text-anchor="middle" font-size="10.5" fill="${FA}" font-family="JetBrains Mono">${esc(r.label)}</text>`;}});return g;}
function barChart(rows,valKey,{color,colorFn,goal,fmtY=(v)=>round(v)}){const W=700,H=210,pl=46,pr=12,pt=12,pb=26,iw=W-pl-pr,ih=H-pt-pb;
  const vals=rows.map(r=>r[valKey]),max=(Math.max(...vals,goal||0)||1)*1.15,n=rows.length,slot=iw/n,bw=Math.min(46,slot*0.6);let bars="";
  rows.forEach((r,i)=>{const v=r[valKey],bh=(v/max)*ih,x=pl+slot*i+slot/2-bw/2,y=pt+ih-bh;bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(0,bh)}" rx="4" fill="${colorFn?colorFn(r):color}"/>`;});
  let gl="";if(goal){const gy=pt+ih-(goal/max)*ih;gl=`<line x1="${pl}" y1="${gy}" x2="${W-pr}" y2="${gy}" stroke="${cssVar('accent')}" stroke-dasharray="4 4"/>`;}
  return chartShell(gridAndLabels(max,fmtY,rows,pl,pr,pt,pb)+bars+gl);}
function lineChart(rows,valKey,{color,fmtY=(v)=>round(v)}){const W=700,H=210,pl=46,pr=12,pt=12,pb=26,iw=W-pl-pr,ih=H-pt-pb;
  const vals=rows.map(r=>r[valKey]),min=Math.min(...vals),max=Math.max(...vals);
  const lo=min===max?Math.max(0,min-5):min-(max-min)*0.15,hi=min===max?max+5:max+(max-min)*0.15,span=hi-lo||1,n=rows.length,LN=cssVar("line"),FA=cssVar("faint");
  const X=i=>pl+(n===1?iw/2:(iw/(n-1))*i),Y=v=>pt+ih-((v-lo)/span)*ih;
  const pts=rows.map((r,i)=>`${X(i)},${Y(r[valKey])}`).join(" ");
  const dots=rows.map((r,i)=>`<circle cx="${X(i)}" cy="${Y(r[valKey])}" r="3.5" fill="${color}"/>`).join("");
  let g="";for(let i=0;i<=2;i++){const val=lo+(i/2)*span,y=Y(val);g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="${LN}" stroke-dasharray="3 3"/><text x="${pl-6}" y="${y+4}" text-anchor="end" font-size="11" fill="${FA}" font-family="JetBrains Mono">${fmtY(val)}</text>`;}
  const step=Math.max(1,Math.ceil(n/7));rows.forEach((r,i)=>{if(i%step===0||i===n-1)g+=`<text x="${X(i)}" y="${H-8}" text-anchor="middle" font-size="10.5" fill="${FA}" font-family="JetBrains Mono">${esc(r.label)}</text>`;});
  return chartShell(g+`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`+dots);}
function pathMap(points,{h=150,color=C.activity}={}){
  if(!points||points.length<2)return `<div class="map" style="height:${h}px;display:grid;place-items:center;color:var(--faint);font-size:12px">No route data</div>`;
  const lats=points.map(p=>p.lat),lngs=points.map(p=>p.lng);
  const minLa=Math.min(...lats),maxLa=Math.max(...lats),minLn=Math.min(...lngs),maxLn=Math.max(...lngs);
  const W=700,H=h*(700/700),pad=24,spanLa=(maxLa-minLa)||1e-5,spanLn=(maxLn-minLn)||1e-5;
  const sc=Math.min((W-2*pad)/spanLn,(H-2*pad)/spanLa);
  const ox=(W-spanLn*sc)/2,oy=(H-spanLa*sc)/2;
  const X=ln=>ox+(ln-minLn)*sc,Y=la=>H-(oy+(la-minLa)*sc);
  const pts=points.map(p=>`${round(X(p.lng),1)},${round(Y(p.lat),1)}`).join(" ");
  return `<div class="map"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${X(points[0].lng)}" cy="${Y(points[0].lat)}" r="6" fill="${cssVar('steps')}"/>
    <circle cx="${X(points[points.length-1].lng)}" cy="${Y(points[points.length-1].lat)}" r="6" fill="${C.heart}"/></svg></div>`;}

function earnedNow(){return BADGES.filter(b=>{try{return b.test(state);}catch(e){return false;}}).map(b=>b.id);}
function seedBadges(){const have=new Set(state.badges.map(b=>b.id));earnedNow().forEach(id=>{if(!have.has(id))state.badges.push({id,earnedAt:Date.now(),seeded:true});});store.set(K.badges,state.badges);}
function checkBadges(){const have=new Set(state.badges.map(b=>b.id));const fresh=earnedNow().filter(id=>!have.has(id));if(fresh.length){fresh.forEach(id=>state.badges.push({id,earnedAt:Date.now()}));store.set(K.badges,state.badges);if(state.cfg.pinnedBadge&&fresh.includes(state.cfg.pinnedBadge)){state.cfg={...state.cfg,pinnedBadge:""};store.set(K.cfg,state.cfg);}congratsQueue.push(...fresh);showNextCongrats();}}

function goalProgress(){
  const g=state.profile.goalType||"Move more";
  if(g==="Run further"){const km=round(sumBy(state.activities.filter(a=>a.date>=daysAgoKey(6)),a=>a.km),1);return {label:"Run further",metric:km+" km this week"};}
  if(g==="Build muscle"){const w=state.workouts.filter(x=>x.date>=daysAgoKey(6)).length;return {label:"Build muscle",metric:w+" workouts this week"};}
  if(g==="Lose weight"){const c=dayCals(todayKey());return {label:"Lose weight",metric:c+" / "+state.cfg.calorieGoal+" kcal today"};}
  if(g==="Sleep better"){const ls=[...state.sleep].sort((a,b)=>b.date.localeCompare(a.date))[0];return {label:"Sleep better",metric:ls?round(ls.hours,1)+"h last night":"log sleep"};}
  const st=(state.steps.find(s=>s.date===todayKey())||{}).count||0;return {label:"Move more",metric:st.toLocaleString()+" / "+state.cfg.stepGoal.toLocaleString()+" steps"};
}

function viewToday(){

  if(lastSleep){const sp=Math.min(1,lastSleep.hours/(state.cfg.sleepGoal||8)),qp=(lastSleep.quality||3)/5;readiness=Math.round(sp*60+qp*40);

    :`<div class="card empty"><div class="ei">${icon("medal",22)}</div><b>No badges yet</b>Log a workout, hit your step goal or finish a run to start earning them.</div>`}`;

function ring(value,color,size=96,track){track=track||cssVar('line');const r=size/2-8,circ=2*Math.PI*r,pct=Math.max(0,Math.min(100,value));
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="8"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ-(pct/100)*circ}"/></svg>`;}

function restTimerUI(){

function viewProgress(){
  const names=[...new Set(state.workouts.flatMap(w=>w.exercises.map(e=>e.name)))].sort();
  if(!names.length)return `<div class="card empty"><div class="ei">${icon("trend",22)}</div><b>Nothing to chart yet</b>Log a few workouts and your strength progression appears automatically.</div>`;

  const data=state.workouts.filter(w=>w.exercises.some(e=>e.name===sel)).map(w=>{const sets=w.exercises.filter(e=>e.name===sel).flatMap(e=>e.sets);
    return {date:w.date,label:shortDate(w.date),best:Math.max(...sets.map(s=>s.weight)),vol:sumBy(sets,s=>s.reps*s.weight),orm:round(Math.max(...sets.map(s=>epley(s.weight,s.reps))),1)};}).sort((a,b)=>a.date.localeCompare(b.date));

function viewSleep(){

  else if(bt.connected)btBody=`<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap"><div class="bpm mono"><span class="hb">${icon("hrt",34,C.heart)}</span> <span id="bpm">${bt.bpm??"—"}</span><small> bpm</small></div><div style="flex:1;min-width:160px"><span class="pill ok">${icon("check",12)}Connected · ${esc(bt.name)}</span><div class="note" style="margin-top:8px">Live heart rate streaming. Capture as today's resting HR.</div></div></div><div class="row" style="margin-top:15px"><button class="btn primary" style="flex:0" data-action="hr-capture" ${bt.bpm?"":"disabled"}>${icon("check",15)}Capture resting HR</button><button class="btn ghost" style="flex:0" data-action="bt-disconnect">${icon("x",15)}Disconnect</button></div>`;

/* ============================ GPS ============================ */
function gpsStart(type){
  gps.type=type;gps.points=[];gps.distance=0;gps.error="";gps.accum=0;gps.segStart=Date.now();gps.elapsed=0;gps.paused=false;gps.active=true;
  state.view="activity";
  clearInterval(gps.tick);gps.tick=setInterval(()=>{if(gps.paused)return;gps.elapsed=(gps.accum+(Date.now()-gps.segStart))/1000;const d=document.getElementById("act-dur");if(d)d.textContent=fmtDur(gps.elapsed);const pc=document.getElementById("act-pace");if(pc)pc.textContent=pace(gps.elapsed,gps.distance/1000);},1000);
  if(navigator.geolocation){
    try{gps.watchId=navigator.geolocation.watchPosition(pos=>{
      if(gps.paused)return;
      const pt={lat:pos.coords.latitude,lng:pos.coords.longitude};
      if(gps.points.length){const last=gps.points[gps.points.length-1];const d=haversine(last,pt);if(d<200)gps.distance+=d;}
      gps.points.push(pt);
      const dd=document.getElementById("act-dist");if(dd)dd.textContent=round(gps.distance/1000,2);
      if(gps.points.length%3===0&&state.view==="activity")render();
    },err=>{gps.error=(err&&err.message)||"location blocked — use manual entry";render();},{enableHighAccuracy:true,maximumAge:1000,timeout:8000});}
    catch(e){gps.error="GPS unavailable — use manual entry";}
  }else{gps.error="No geolocation on this device — use manual entry";}
  buzz(40);render();
}
function gpsPause(){if(!gps.active)return;if(gps.paused){gps.segStart=Date.now();gps.paused=false;}else{gps.accum+=Date.now()-gps.segStart;gps.paused=true;}buzz(30);render();}
function gpsCountdown(){const o=document.getElementById("overlay");o.className="overlay";let n=3;
  const draw=()=>{o.innerHTML=`<div class="sheet" style="text-align:center;max-width:280px"><div class="livelbl" style="margin-bottom:10px">Starting ${esc(actSel)}…</div><div style="font-size:82px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);line-height:1">${n}</div><button class="btn ghost wide" style="margin-top:18px" data-action="gps-cd-cancel">${icon("x",15)}Cancel</button></div>`;};
  draw();beep(1);buzz(50);
  gps._cd=setInterval(()=>{n--;if(n>0){draw();beep(1);buzz(50);}else{clearInterval(gps._cd);gps._cd=null;o.classList.add("hidden");o.innerHTML="";beep(2);buzz(120);gpsStart(actSel);}},1000);}
function gpsCountdownCancel(){if(gps._cd){clearInterval(gps._cd);gps._cd=null;}const o=document.getElementById("overlay");o.classList.add("hidden");o.innerHTML="";}
function gpsStop(){
  clearInterval(gps.tick);if(gps.watchId!=null&&navigator.geolocation)try{navigator.geolocation.clearWatch(gps.watchId);}catch(e){}
  const km=round(gps.distance/1000,2),sec=Math.round(gps.paused?gps.accum/1000:(gps.accum+(Date.now()-gps.segStart))/1000);
  if(km>0.02||sec>5){
    const cal=estCal(gps.type,km,sec);
    state.activities=[{id:uid(),date:todayKey(),type:gps.type,km,sec,cal,source:"gps",points:gps.points.slice()},...state.activities];
    store.set(K.act,state.activities);toast(`Saved ${km} km ${gps.type}`);checkBadges();
  }else toast("Activity too short to save");
  gps.active=false;gps.watchId=null;gps.points=[];gps.distance=0;render();
}

/* ============================ import/export/bluetooth ============================ */
function importSteps(entries){let added=0;entries.forEach(e=>{if(!e.date||!(e.count>0))return;state.steps=[...state.steps.filter(s=>s.date!==e.date),{id:uid(),date:e.date,count:Math.round(e.count)}];added++;});if(added){store.set(K.st,state.steps);checkBadges();}return added;}
function normDate(v){v=String(v).trim();let m;if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);if((m=v.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/))){let a=+m[1],b=+m[2],y=+m[3];if(y<100)y+=2000;let mo,da;if(a>12){da=a;mo=b;}else{mo=a;da=b;}if(mo>12)return null;return `${y}-${pad(mo)}-${pad(da)}`;}const d=new Date(v);return isNaN(d)?null:toKey(d);}
function parseImport(text,filename){text=text.replace(/^\uFEFF/,"").trim();
  if(filename.endsWith(".json")||text[0]==="["||text[0]==="{"){try{let j=JSON.parse(text);if(Array.isArray(j.steps))j=j.steps;if(!Array.isArray(j))throw 0;return j.map(r=>({date:normDate(r.date||r.day||r.dateTime||r.time),count:num(r.count??r.steps??r.value??r.total)})).filter(r=>r.date&&r.count>0);}catch(e){return null;}}
  const lines=text.split(/\r?\n/).filter(l=>l.trim());if(!lines.length)return [];
  const delim=(lines[0].match(/;/g)||[]).length>(lines[0].match(/,/g)||[]).length?";":",";
  const split=l=>{const out=[];let cur="",q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===delim&&!q){out.push(cur);cur="";}else cur+=ch;}out.push(cur);return out.map(s=>s.trim().replace(/^"|"$/g,""));};
  const first=split(lines[0]),headerIsText=first.some(c=>c&&isNaN(num(c))&&!/^\d{4}-\d{2}-\d{2}/.test(c));
  let dateIdx=0,stepIdx=1,body;
  if(headerIsText){const h=first.map(c=>c.toLowerCase());dateIdx=h.findIndex(c=>/date|day|time/.test(c));stepIdx=h.findIndex(c=>/step/.test(c));if(stepIdx<0)stepIdx=h.findIndex(c=>/count|value|total/.test(c));if(dateIdx<0)dateIdx=0;if(stepIdx<0)stepIdx=1;body=lines.slice(1);}else body=lines;
  return body.map(l=>{const c=split(l);return {date:normDate(c[dateIdx]),count:num(String(c[stepIdx]).replace(/[, ]/g,""))};}).filter(r=>r.date&&r.count>0);}
function handleFile(file){const reader=new FileReader();reader.onload=()=>{const parsed=parseImport(String(reader.result),file.name.toLowerCase());if(parsed===null){connectMsg={type:"err",text:"Couldn't read that file — expected CSV or JSON with dates and step counts."};render();return;}const added=importSteps(parsed);connectMsg=added?{type:"ok",text:`Imported ${added} day${added>1?"s":""} of steps from ${file.name}.`}:{type:"err",text:"No step entries found. Check for a date column and a steps column."};render();};reader.onerror=()=>{connectMsg={type:"err",text:"Couldn't open that file."};render();};reader.readAsText(file);}
function exportBackup(){const blob=new Blob([JSON.stringify({app:"APEX",exported:new Date().toISOString(),workouts:state.workouts,sleep:state.sleep,steps:state.steps,hr:state.hr,nutrition:state.nutrition,activities:state.activities,profile:state.profile,settings:state.cfg},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`apex-backup-${todayKey()}.json`;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},100);toast("Backup downloaded");}
async function btPair(){bt.error="";if(!navigator.bluetooth){bt.error="Web Bluetooth not available";render();return;}
  try{const device=await navigator.bluetooth.requestDevice({filters:[{services:["heart_rate"]}],optionalServices:["battery_service"]});bt.device=device;bt.name=device.name||"Device";device.addEventListener("gattserverdisconnected",()=>{bt.connected=false;if(state.view==="connect")render();});
    const server=await device.gatt.connect(),svc=await server.getPrimaryService("heart_rate"),ch=await svc.getCharacteristic("heart_rate_measurement");await ch.startNotifications();
    ch.addEventListener("characteristicvaluechanged",e=>{const v=e.target.value,flags=v.getUint8(0);bt.bpm=(flags&1)?v.getUint16(1,true):v.getUint8(1);const el=document.getElementById("bpm");if(el)el.textContent=bt.bpm;});
    bt.connected=true;render();}catch(e){bt.error=(e&&e.name==="NotFoundError")?"cancelled":(e&&e.message)||"connection failed";render();}}
function btDisconnect(){try{if(bt.device&&bt.device.gatt.connected)bt.device.gatt.disconnect();}catch(e){}bt.connected=false;bt.bpm=null;render();}
function captureHR(){if(!bt.bpm)return;const date=todayKey();state.hr=[...state.hr.filter(h=>h.date!==date),{date,bpm:bt.bpm}];store.set(K.hr,state.hr);connectMsg={type:"ok",text:`Saved ${bt.bpm} bpm as today's resting HR.`};render();}

/* ============================ barcode scanner ============================ */
const scanner={stream:null,raf:null,active:false,product:null};
function openScanner(){const o=document.getElementById("overlay");o.className="overlay";
  o.innerHTML=`<div class="sheet" style="max-width:440px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px">${icon("scan",18,cssVar("accent"))}Scan a product</div><button class="icon" data-action="scan-close">${icon("x",18)}</button></div>
    <div id="scan-stage"><video id="scan-video" class="scanvid" playsinline muted></video><div id="scan-status" class="note" style="margin-top:12px">Point your camera at the product barcode…</div></div>
    <div style="border-top:1px solid var(--line);margin-top:16px;padding-top:14px"><label class="f">Or enter the barcode number</label>
      <div class="row"><input class="mono" id="scan-code" inputmode="numeric" placeholder="e.g. 5000159407236"><button class="btn primary" style="flex:0" data-action="scan-manual">${icon("check",15)}Look up</button></div></div></div>`;
  startCamera();
}
async function startCamera(){
  const status=()=>document.getElementById("scan-status");
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){if(status())status().innerHTML="Camera isn't available here — type the barcode number below.";return;}
  let det=null;
  if("BarcodeDetector" in window){try{det=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","qr_code"]});}catch(e){try{det=new BarcodeDetector();}catch(e2){det=null;}}}
  try{
    scanner.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    const video=document.getElementById("scan-video");if(!video){stopCamera();return;}
    video.srcObject=scanner.stream;await video.play();scanner.active=true;
    if(det){const loop=async()=>{if(!scanner.active)return;try{const codes=await det.detect(video);if(codes&&codes.length&&codes[0].rawValue){scanner.active=false;buzz(60);lookupProduct(codes[0].rawValue);return;}}catch(e){}scanner.raf=requestAnimationFrame(loop);};scanner.raf=requestAnimationFrame(loop);}
    else if(status())status().innerHTML="Live decoding isn't supported in this browser — type the barcode number below and tap Look up.";
  }catch(e){if(status())status().innerHTML="Couldn't access the camera ("+esc(e.name||"blocked")+"). Enter the barcode number below instead.";}
}
function stopCamera(){scanner.active=false;if(scanner.raf){cancelAnimationFrame(scanner.raf);scanner.raf=null;}if(scanner.stream){scanner.stream.getTracks().forEach(t=>t.stop());scanner.stream=null;}}
function closeScanner(){stopCamera();const o=document.getElementById("overlay");o.classList.add("hidden");o.innerHTML="";}
async function lookupProduct(code){stopCamera();const stage=document.getElementById("scan-stage");if(stage)stage.innerHTML=`<div class="note">Looking up ${esc(code)}…</div>`;
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${encodeURIComponent(code)}.json`);
    const d=await r.json();
    if(!d||d.status!==1||!d.product){renderScanMsg("Not found",`Barcode ${esc(code)} isn't in the Open Food Facts database. Scan another, or close and add it with the food form.`);return;}
    const p=d.product,n=p.nutriments||{};
    const name=([p.brands,p.product_name].filter(Boolean).join(" ").trim())||("Product "+code);
    const per100=(n["energy-kcal_100g"]!=null||n.proteins_100g!=null)?{cal:Math.round(num(n["energy-kcal_100g"])),prot:round(num(n.proteins_100g),1),carb:round(num(n.carbohydrates_100g),1),fat:round(num(n.fat_100g),1)}:null;
    const serving=(n["energy-kcal_serving"]!=null)?{cal:Math.round(num(n["energy-kcal_serving"])),prot:round(num(n.proteins_serving),1),carb:round(num(n.carbohydrates_serving),1),fat:round(num(n.fat_serving),1),label:p.serving_size||""}:null;
    if(!per100&&!serving){renderScanMsg("No nutrition data",`We found "${esc(name)}" but it has no nutrition values in the database. Close this and add it with the food form.`);return;}
    scanner.product={name,per100,serving};scanner.mode=null;
    renderScanConfirm();
  }catch(e){renderScanMsg("Lookup failed","Couldn't reach the product database. This needs internet and may be blocked inside a preview — it works when the app is opened in a normal browser.");}
}
function scanTotals(qty){const p=scanner.product;if(scanner.mode==="grams"){const b=p.per100,f=(qty||0)/100;return {cal:Math.round(b.cal*f),prot:round(b.prot*f,1),carb:round(b.carb*f,1),fat:round(b.fat*f,1)};}const b=p.serving,q=qty||0;return {cal:Math.round(b.cal*q),prot:round(b.prot*q,1),carb:round(b.carb*q,1),fat:round(b.fat*q,1)};}
function renderScanConfirm(){const p=scanner.product,o=document.getElementById("overlay");
  const hasServ=!!p.serving,hasG=!!p.per100;
  if(!scanner.mode)scanner.mode=hasServ?"serving":"grams";
  const mode=scanner.mode,basis=mode==="grams"?p.per100:p.serving;
  const perLbl=mode==="grams"?"per 100 g":(p.serving.label?`per serving (${esc(p.serving.label)})`:"per serving");
  const defQty=mode==="grams"?100:1,t=scanTotals(defQty);
  o.innerHTML=`<div class="sheet" style="max-width:440px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-weight:700;font-size:17px">Product found</div><button class="icon" data-action="scan-close">${icon("x",18)}</button></div>
    <div class="card" style="margin-bottom:14px"><div style="font-weight:600;font-size:15px;margin-bottom:5px">${esc(p.name)}</div><div class="note">${basis.cal} kcal · P ${basis.prot}g · C ${basis.carb}g · F ${basis.fat}g <span style="color:var(--faint)">${perLbl}</span></div></div>
    ${(hasServ&&hasG)?`<div class="chips" style="margin-bottom:14px"><button class="chip ${mode==="serving"?"on":""}" data-action="scan-mode" data-mode="serving">Servings</button><button class="chip ${mode==="grams"?"on":""}" data-action="scan-mode" data-mode="grams">Grams</button></div>`:""}
    <label class="f">${mode==="grams"?"Amount (g)":"Servings"}</label><div class="row" style="align-items:flex-end"><input class="mono" id="scan-qty" type="number" value="${defQty}" step="${mode==="grams"?"10":"0.5"}" min="0"><button class="btn primary" style="flex:0" data-action="scan-add">${icon("check",15)}Add</button></div>
    <div class="note" id="scan-total" style="margin-top:12px">Total: <b>${t.cal} kcal</b> · P ${t.prot}g · C ${t.carb}g · F ${t.fat}g</div>
    <button class="btn ghost wide" style="margin-top:12px" data-action="scan-again">${icon("scan",15)}Scan another</button></div>`;
}
function renderScanMsg(title,msg){const o=document.getElementById("overlay");o.innerHTML=`<div class="sheet" style="max-width:440px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-weight:700;font-size:17px">${esc(title)}</div><button class="icon" data-action="scan-close">${icon("x",18)}</button></div><div class="msg err">${msg}</div><button class="btn primary wide" data-action="scan-again">${icon("scan",15)}Scan again</button></div>`;}
function scanAdd(){const p=scanner.product;if(!p)return;const q=num(document.getElementById("scan-qty").value)||(scanner.mode==="grams"?100:1);const t=scanTotals(q);const suffix=scanner.mode==="grams"?` (${Math.round(q)}g)`:"";
  state.nutrition=[{id:uid(),date:todayKey(),name:p.name+suffix,kind:"food",calories:t.cal,protein:t.prot,carbs:t.carb,fat:t.fat},...state.nutrition];
  store.set(K.nut,state.nutrition);closeScanner();toast("Logged "+p.name);checkBadges();if(state.view==="nutrition")render();}

document.getElementById("fileinput").addEventListener("change",e=>{const f=e.target.files[0];if(f)handleFile(f);e.target.value="";});
function handleAvatar(file){const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>openCrop(img);img.onerror=()=>toast("Couldn't load that image");img.src=reader.result;};reader.onerror=()=>toast("Couldn't read that image");reader.readAsDataURL(file);}
let crop=null;
function openCrop(img){const o=document.getElementById("overlay");o.className="overlay";crop={img,natW:img.naturalWidth||img.width,natH:img.naturalHeight||img.height};
  o.innerHTML=`<div class="sheet" style="max-width:320px;text-align:center">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-weight:700;font-size:16px">Adjust photo</div><button class="icon" data-action="crop-cancel">${icon("x",18)}</button></div>
    <div id="crop-vp" style="position:relative;width:260px;max-width:100%;aspect-ratio:1/1;border-radius:50%;overflow:hidden;background:#000;margin:0 auto 8px;touch-action:none;cursor:grab"><img id="crop-img" src="${img.src}" draggable="false" style="position:absolute;user-select:none;pointer-events:none"></div>
    <div class="note" style="margin-bottom:12px">Drag to reposition · slide to zoom</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;color:var(--faint)">${icon("user",16)}<input type="range" id="crop-zoom" min="1" max="3" step="0.01" value="1" style="flex:1;accent-color:var(--accent)">${icon("plus",16)}</div>
    <div class="row"><button class="btn ghost" data-action="crop-cancel">Cancel</button><button class="btn primary" data-action="crop-set">${icon("check",15)}Set photo</button></div></div>`;
  requestAnimationFrame(wireCrop);
}
function wireCrop(){const vp=document.getElementById("crop-vp");if(!vp)return;const V=vp.clientWidth||260;crop.VP=V;
  crop.base=Math.max(V/crop.natW,V/crop.natH);crop.scale=1;crop.dispW=crop.natW*crop.base;crop.dispH=crop.natH*crop.base;crop.x=(V-crop.dispW)/2;crop.y=(V-crop.dispH)/2;cropUpdate();
  let drag=false,px=0,py=0;
  vp.addEventListener("pointerdown",e=>{drag=true;px=e.clientX;py=e.clientY;try{vp.setPointerCapture(e.pointerId);}catch(_){}vp.style.cursor="grabbing";});
  vp.addEventListener("pointermove",e=>{if(!drag)return;crop.x+=e.clientX-px;crop.y+=e.clientY-py;px=e.clientX;py=e.clientY;cropClamp();cropUpdate();});
  vp.addEventListener("pointerup",()=>{drag=false;vp.style.cursor="grab";});
  vp.addEventListener("pointercancel",()=>{drag=false;});
  document.getElementById("crop-zoom").addEventListener("input",e=>{const ns=+e.target.value,V=crop.VP,fx=(V/2-crop.x)/crop.dispW,fy=(V/2-crop.y)/crop.dispH;crop.scale=ns;crop.dispW=crop.natW*crop.base*ns;crop.dispH=crop.natH*crop.base*ns;crop.x=V/2-fx*crop.dispW;crop.y=V/2-fy*crop.dispH;cropClamp();cropUpdate();});
}
function cropClamp(){const V=crop.VP;crop.x=Math.min(0,Math.max(V-crop.dispW,crop.x));crop.y=Math.min(0,Math.max(V-crop.dispH,crop.y));}
function cropUpdate(){const im=document.getElementById("crop-img");if(!im)return;im.style.left=crop.x+"px";im.style.top=crop.y+"px";im.style.width=crop.dispW+"px";im.style.height=crop.dispH+"px";}
function cropSet(){if(!crop)return;const OUT=160,V=crop.VP,r=OUT/V,c=document.createElement("canvas");c.width=OUT;c.height=OUT;const ctx=c.getContext("2d");ctx.drawImage(crop.img,crop.x*r,crop.y*r,crop.dispW*r,crop.dispH*r);const avatar=c.toDataURL("image/jpeg",0.85);
  const M=512,sc=Math.min(1,M/Math.max(crop.natW,crop.natH)),sw=Math.max(1,Math.round(crop.natW*sc)),sh=Math.max(1,Math.round(crop.natH*sc)),s2=document.createElement("canvas");s2.width=sw;s2.height=sh;s2.getContext("2d").drawImage(crop.img,0,0,sw,sh);const avatarSrc=s2.toDataURL("image/jpeg",0.85);
  state.profile={...state.profile,avatar,avatarSrc};store.set(K.prof,state.profile);closeCrop();render();toast("Photo updated");}
function closeCrop(){const o=document.getElementById("overlay");o.classList.add("hidden");o.innerHTML="";crop=null;}

  else if(act==="cfg-toggle"){const k=a.dataset.key,nv=!state.cfg[k];state.cfg={...state.cfg,[k]:nv};store.set(K.cfg,state.cfg);if(k==="notifEnabled"&&nv&&typeof Notification!=="undefined"&&Notification.requestPermission){try{Notification.requestPermission();}catch(e){}}render();}
  else if(act==="save-profile"){const gsel=document.querySelector("#se-goal .chip.on");state.profile={...state.profile,name:document.getElementById("se-name").value.trim()||state.profile.name,age:document.getElementById("se-age").value,weight:document.getElementById("se-weight").value,height:document.getElementById("se-height").value,gender:document.getElementById("se-gender").value,goalType:gsel?gsel.dataset.goal:state.profile.goalType,goalText:document.getElementById("se-goaltext").value.trim()};store.set(K.prof,state.profile);render();toast("Profile saved");}
  else if(act==="save-goals"){state.cfg={...state.cfg,stepGoal:Math.round(num(document.getElementById("se-stepgoal").value))||state.cfg.stepGoal,sleepGoal:num(document.getElementById("se-sleepgoal").value)||state.cfg.sleepGoal,calorieGoal:Math.round(num(document.getElementById("se-calgoal").value))||state.cfg.calorieGoal,waterGoal:num(document.getElementById("se-watergoal").value)||state.cfg.waterGoal};store.set(K.cfg,state.cfg);render();toast("Goals updated");}
  else if(act==="nav-up"||act==="nav-down"){const i=+a.dataset.i,j=act==="nav-up"?i-1:i+1;const o=state.cfg.navOrder;if(j<0||j>=o.length)return;[o[i],o[j]]=[o[j],o[i]];store.set(K.cfg,state.cfg);render();}
  else if(act==="bt-pair"){btPair();}else if(act==="bt-disconnect"){btDisconnect();}else if(act==="hr-capture"){captureHR();}
  else if(act==="import-file"){document.getElementById("fileinput").click();}else if(act==="export-backup"){exportBackup();}
  else if(act==="scan-open"){openScanner();}
  else if(act==="avatar-pick"){document.getElementById("avatarinput").click();}
  else if(act==="avatar-crop"){const src=state.profile.avatarSrc||state.profile.avatar;if(src){const img=new Image();img.onload=()=>openCrop(img);img.src=src;}}
  else if(act==="avatar-remove"){state.profile={...state.profile,avatar:""};store.set(K.prof,state.profile);render();}
  else if(act==="friend-add"){const n=(document.getElementById("friend-name").value||"").trim();if(n){const fr=state.cfg.friends||[];if(!fr.includes(n)){state.cfg={...state.cfg,friends:[...fr,n]};store.set(K.cfg,state.cfg);}render();}}
  else if(act==="friend-remove"){state.cfg={...state.cfg,friends:(state.cfg.friends||[]).filter(x=>x!==a.dataset.name)};store.set(K.cfg,state.cfg);render();}
  else if(act==="badge-pin"){state.cfg={...state.cfg,pinnedBadge:a.dataset.id};store.set(K.cfg,state.cfg);const o=document.getElementById("overlay");o.classList.add("hidden");o.innerHTML="";toast("Pinned — work towards it!");render();}
  else if(act==="badge-unpin"){state.cfg={...state.cfg,pinnedBadge:""};store.set(K.cfg,state.cfg);const o=document.getElementById("overlay");o.classList.add("hidden");o.innerHTML="";toast("Unpinned");render();}
});
document.addEventListener("change",e=>{if(e.target.id==="ex-sel"){state._sel=e.target.value;render();}
  else if((e.target.id==="rt-min"||e.target.id==="rt-sec")&&!rest.running){const el=document.getElementById("rt-disp");if(el)el.textContent=fmtDur((+document.getElementById("rt-min").value)*60+(+document.getElementById("rt-sec").value));}});
document.addEventListener("input",e=>{if(e.target.id==="scan-qty"&&scanner.product){const t=scanTotals(num(e.target.value));const el=document.getElementById("scan-total");if(el)el.innerHTML=`Total: <b>${t.cal} kcal</b> · P ${t.prot}g · C ${t.carb}g · F ${t.fat}g`;}});

/* ============================ init ============================ */
document.getElementById("markicon").innerHTML=icon("activity",20,"var(--accent-ink)");
document.getElementById("datelbl").textContent=new Date().toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
render();
(async()=>{
  const[w,s,st,hr,nut,act,prof,badges,cfg]=await Promise.all([store.get(K.w,[]),store.get(K.s,[]),store.get(K.st,[]),store.get(K.hr,[]),store.get(K.nut,[]),store.get(K.act,[]),store.get(K.prof,null),store.get(K.badges,[]),store.get(K.cfg,null)]);
  state.workouts=w;state.sleep=s;state.steps=st;state.hr=hr;state.nutrition=nut;state.activities=act;state.badges=badges;
  if(prof)state.profile=prof;
  if(cfg)state.cfg={...state.cfg,...cfg,navOrder:Array.isArray(cfg.navOrder)&&cfg.navOrder.length?cfg.navOrder.filter(x=>SECTIONS[x]):[...DEFAULT_NAV]};
  state.loaded=true;seedBadges();render();
})();
</script>
</body>
</html>
